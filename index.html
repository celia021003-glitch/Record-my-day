<script>

const SR='Georgia,"Songti SC",serif';
const TH={
  mist:   {name:'雾紫', bg:'#F2F0F4',card:'#FFF',ink:'#2D2A35',muted:'#8A8595',faint:'#B6B1C0',line:'#E6E2EC',p:'#5A4E72',pS:'#EDE9F2',g:'#6E7F6B',gS:'#EAF0E8',w:'#C98763',wS:'#F6EBE2'},

  matcha: {name:'抹茶', bg:'#F3F2E9',card:'#FFF',ink:'#36382E',muted:'#8B8C78',faint:'#B6B7A2',line:'#E6E5D6',p:'#6E8B5B',pS:'#E9EFE0',g:'#9A8C5E',gS:'#F0ECDD',w:'#C08552',wS:'#F4EADD'},
  dusk:   {name:'暮蓝', bg:'#EDF0F4',card:'#FFF',ink:'#2B313B',muted:'#7E8794',faint:'#AAB3C0',line:'#DEE3EA',p:'#4F6680',pS:'#E4EAF1',g:'#4E8C84',gS:'#E0EEEC',w:'#D08368',wS:'#F6E8E1'},

const STICKERS=['🌷','⭐️','🍃','☕️','🐱','🌙','🎀','🫧'];

const CURS=['$','A$','¥','€','£'];
 
// ═══════════════════════ INDEXEDDB ═══════════════════════
let _db=null;
const canIDB=typeof indexedDB!=='undefined';
const ls={
  get:k=>{try{return Promise.resolve(JSON.parse(localStorage.getItem('xbn:'+k)))}catch(e){return Promise.resolve(null)}},
  set:(k,v)=>{try{localStorage.setItem('xbn:'+k,JSON.stringify(v));return Promise.resolve(true)}catch(e){alert('手机浏览器存储空间可能满了，建议先导出备份。');return Promise.resolve(false)}},
  del:k=>{try{localStorage.removeItem('xbn:'+k)}catch(e){}return Promise.resolve(true)},
  keys:pre=>{try{const out=[];for(let i=0;i<localStorage.length;i++){const k=localStorage.key(i)||'';if(k.startsWith('xbn:')){const real=k.slice(4);if(!pre||real.startsWith(pre))out.push(real)}}return Promise.resolve(out)}catch(e){return Promise.resolve([])}}
};
function openDB(){
  if(!canIDB)return Promise.reject(new Error('IndexedDB unavailable'));
  if(_db)return Promise.resolve(_db);
  return new Promise((res,rej)=>{
    const r=indexedDB.open('xbn1',1);
    r.onupgradeneeded=()=>r.result.createObjectStore('kv');
    r.onsuccess=()=>{_db=r.result;res(_db)};
    r.onerror=()=>rej(r.error);
  });
}
const idb={
  get:k=>openDB().then(db=>new Promise(res=>{const r=db.transaction('kv').objectStore('kv').get(k);r.onsuccess=()=>res(r.result??null);r.onerror=()=>res(null)})).catch(()=>ls.get(k)),
  set:(k,v)=>openDB().then(db=>new Promise(res=>{const r=db.transaction('kv','readwrite').objectStore('kv').put(v,k);r.onsuccess=()=>res(true);r.onerror=()=>res(false)})).catch(()=>ls.set(k,v)),
  del:k=>openDB().then(db=>new Promise(res=>{const r=db.transaction('kv','readwrite').objectStore('kv').delete(k);r.onsuccess=()=>res(true);r.onerror=()=>res(false)})).catch(()=>ls.del(k)),
  keys:pre=>openDB().then(db=>new Promise(res=>{const ks=[];const r=db.transaction('kv').objectStore('kv').openKeyCursor();r.onsuccess=()=>{const c=r.result;if(c){if(!pre||String(c.key).startsWith(pre))ks.push(c.key);c.continue()}else res(ks)};r.onerror=()=>res([])})).catch(()=>ls.keys(pre))
};
 
// ═══════════════════════ STATE ═══════════════════════
let S={entries:{},pantry:[],wishlist:[],lists:[],journal:[],frags:[],period:{days:{},syms:{}},expenses:[],theme:'mist',accent:null,accentA:0.13,bgc:null,cur:'$'};
let IC={};  // image cache
let TAB='today', DATE=dstr(new Date());
// ephemeral ui state
let wIn='',mTxt='',mType='早餐';
let pN='',pQ='',pU='个',pE='';
let wiTxt='';
let nList='',liIn={};
let jTxt='',jMood='✨',jFont='kai',jHi=null,jTape=TAPES[0],jSt=null,jImgs=[];
let meTxt='',meImgs=[],composing=false,readFrag=null;
let eAmt='',eCat='餐饮',eNote='',eDate=dstr(new Date()),eMon=dstr(new Date()).slice(0,7);
let photoPrev='';
let showSett=false;
let sHsl={h:200,s:50,l:55};
let C={};
 
// ═══════════════════════ UTILS ═══════════════════════
function dstr(d){return d.getFullYear()+'-'+p2(d.getMonth()+1)+'-'+p2(d.getDate())}
function p2(n){return String(n).padStart(2,'0')}
function today(){return dstr(new Date())}
function parseD(s){const[y,m,d]=s.split('-').map(Number);return new Date(y,m-1,d)}
function shiftD(s,n){const[y,m,d]=s.split('-').map(Number);return dstr(new Date(y,m-1,d+n))}
function diffD(a,b){return Math.round((parseD(b)-parseD(a))/864e5)}
function prettyD(s){const[y,m,d]=s.split('-').map(Number);const w=['日','一','二','三','四','五','六'][new Date(y,m-1,d).getDay()];return m+'月'+d+'日 · 周'+w}
function daysUntil(s){if(!s)return null;const n=new Date();n.setHours(0,0,0,0);return Math.round((parseD(s)-n)/864e5)}
function shiftM(ym,n){const[y,m]=ym.split('-').map(Number);const d=new Date(y,m-1+n,1);return d.getFullYear()+'-'+p2(d.getMonth()+1)}
function fmtMoney(n){
  if(!Number.isFinite(n))return '';
  const v=Math.round(n*100)/100;
  return String(v).replace(/\.0+$/,'').replace(/(\.\d)0$/,'$1')
}
function calcAmount(raw){
  let s=String(raw||'').trim();
  if(!s)return NaN;
  s=s.replace(/[，,]/g,'').replace(/[×xX]/g,'*').replace(/[÷]/g,'/').replace(/[＋]/g,'+').replace(/[−－—–]/g,'-').replace(/\s+/g,'').replace(/[￥¥$€£]/g,'');
  if(!s||!/\d/.test(s)||!/^[0-9+\-*/().]+$/.test(s))return NaN;
  try{const v=Function('"use strict";return ('+s+')')();return Number.isFinite(v)?Math.round(v*100)/100:NaN}catch(e){return NaN}
}
function setEAmt(v){
  eAmt=String(v||'');
  const el=document.getElementById('eAmt');
  if(el){el.value=eAmt;el.focus()}
}
function pressCalcKey(k){
  const cur=String(eAmt||'');
  if(k==='C'){setEAmt('');return}
  if(k==='⌫'){setEAmt(cur.slice(0,-1));return}
  if(k==='='){
    const v=calcAmount(cur);
    if(Number.isFinite(v))setEAmt(fmtMoney(v));
    return
  }
  setEAmt(cur+k)
}
function clamp(n,a,b){return Math.max(a,Math.min(b,n))}
function aHex(a){return Math.round(clamp(a,0,1)*255).toString(16).padStart(2,'0')}
function h2hsl(hex){
  let r=parseInt(hex.slice(1,3),16)/255,g=parseInt(hex.slice(3,5),16)/255,b=parseInt(hex.slice(5,7),16)/255;
  const mx=Math.max(r,g,b),mn=Math.min(r,g,b);let h,s,l=(mx+mn)/2;
  if(mx===mn){h=s=0}else{const d=mx-mn;s=l>.5?d/(2-mx-mn):d/(mx+mn);switch(mx){case r:h=(g-b)/d+(g<b?6:0);break;case g:h=(b-r)/d+2;break;default:h=(r-g)/d+4}h/=6}
  return{h:Math.round(h*360),s:Math.round(s*100),l:Math.round(l*100)}
}
function hsl2hex(h,s,l){
  s/=100;l/=100;const k=n=>(n+h/30)%12;const a=s*Math.min(l,1-l);
  const f=n=>{const c=l-a*Math.max(-1,Math.min(k(n)-3,Math.min(9-k(n),1)));return Math.round(255*c).toString(16).padStart(2,'0')};
  return'#'+f(0)+f(8)+f(4)
}
function resolveC(){
  const t={...(TH[S.theme]||TH.mist)};
  if(S.bgc)t.bg=S.bgc;
  if(S.accent){t.p=S.accent;t.pS=S.accent+aHex(S.accentA??0.13)}
  return t
}
function getE(d){d=d||DATE;return S.entries[d]||{weight:null,meals:[],water:0,photos:[]}}
function wSer(){return Object.keys(S.entries).filter(d=>S.entries[d].weight!=null).sort().map(d=>({d,w:S.entries[d].weight,l:d.slice(5)}))}
function cycInfo(){
  const pd=S.period,days=Object.keys(pd.days||{}).sort(),gs=[];let cur=null;
  for(const d of days){if(cur&&diffD(cur.e,d)<=1)cur.e=d;else{cur={s:d,e:d};gs.push(cur)}}
  const sts=gs.map(g=>g.s);let cL=28,pL=5;
  if(sts.length>=2){const gaps=[];for(let i=1;i<sts.length;i++)gaps.push(diffD(sts[i-1],sts[i]));cL=clamp(Math.round(gaps.reduce((a,b)=>a+b,0)/gaps.length),21,35)}
  if(gs.length){const lens=gs.map(g=>diffD(g.s,g.e)+1);pL=clamp(Math.round(lens.reduce((a,b)=>a+b,0)/lens.length),2,8)}
  return{gs,sts,cL,pL,last:sts.length?sts[sts.length-1]:null}
}
 
// ═══════════════════════ IMAGES ═══════════════════════
function compressFile(file){
  return new Promise((res,rej)=>{
    const img=new Image(),url=URL.createObjectURL(file);
    img.onload=()=>{
      const s=Math.min(1,600/Math.max(img.width,img.height));
      const w=Math.round(img.width*s),h=Math.round(img.height*s);
      const cv=document.createElement('canvas');cv.width=w;cv.height=h;
      cv.getContext('2d').drawImage(img,0,0,w,h);URL.revokeObjectURL(url);
      res(cv.toDataURL('image/jpeg',.6))
    };
    img.onerror=()=>{URL.revokeObjectURL(url);rej(new Error('img'))};
    img.src=url
  })
}
async function storeImg(dataUrl){
  const id='i'+Date.now().toString(36)+Math.random().toString(36).slice(2,5);
  await idb.set('img:'+id,dataUrl);IC[id]=dataUrl;return id
}
async function loadImg(id){
  if(!id)return null;if(IC[id])return IC[id];
  const v=await idb.get('img:'+id);if(v)IC[id]=v;return v||null
}
async function delImg(id){delete IC[id];await idb.del('img:'+id)}
 
// ═══════════════════════ PERSIST ═══════════════════════
const SKEY='xbn-v1';
async function save(next){S=next;try{await idb.set(SKEY,JSON.stringify(next))}catch(e){}render()}
function mutE(fn){
  const n={...S,entries:{...S.entries}};
  const e={...getE()};e.meals=[...(e.meals||[])];e.photos=[...(e.photos||[])];
  fn(e);n.entries[DATE]=e;save(n)
}
async function loadState(){
  try{const v=await idb.get(SKEY);if(v){const d=JSON.parse(v);S={...S,...d,period:d.period||{days:{},syms:{}},expenses:d.expenses||[],frags:d.frags||[]}}}catch(e){}
  wIn=getE().weight!=null?String(getE().weight):'';
  render()
}
 
// ═══════════════════════ HTML HELPERS ═══════════════════════
function IS(ex){return`border:1px solid ${C.line};border-radius:10px;padding:10px 12px;font-size:14px;outline:none;color:${C.ink};background:#FBFAFC;width:100%;box-sizing:border-box;${ex||''}`}
function BS(col,ex){return`background:${col};color:#fff;border:none;border-radius:10px;padding:10px 16px;font-size:14px;cursor:pointer;white-space:nowrap;${ex||''}`}
function card(title,body){return`<div style="background:${C.card};border-radius:16px;padding:16px 18px;margin-bottom:14px;box-shadow:0 1px 4px rgba(0,0,0,.06)">${title?`<div style="font-size:13px;font-weight:600;color:${C.muted};margin-bottom:12px">${e(title)}</div>`:''}</div>`.replace('</div>',body+'</div>')}
function e(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}
function pill(on,col,soft,label,action,val){return`<button data-a="${action||''}" data-v="${e(val??label)}" style="padding:5px 12px;border-radius:999px;border:none;cursor:pointer;font-size:13px;background:${on?col:soft};color:${on?'#fff':col}">${e(label)}</button>`}
function xbtn(action,id){return`<button data-a="${action}" data-id="${id}" style="background:none;border:none;color:${C.faint};cursor:pointer;font-size:18px;line-height:1;padding:0;flex-shrink:0">×</button>`}
function statBox(label,val,tone,bg){return`<div style="flex:1;background:${bg};border-radius:14px;padding:12px 14px"><div style="font-size:11px;color:${C.muted};margin-bottom:4px">${e(label)}</div><div style="font-family:${SR};font-size:22px;font-weight:600;color:${tone}">${e(val)}</div></div>`}
function empty(txt){return`<div style="text-align:center;color:${C.faint};font-size:13px;padding:18px 0">${e(txt)}</div>`}
 
// ═══════════════════════ CHART ═══════════════════════
function renderChart(ser){
  if(ser.length<2)return empty('记录两天以上体重，这里会出现趋势曲线。');
  const W=500,H=155,pad=28;
  const ws=ser.map(s=>s.w),mn=Math.min(...ws),mx=Math.max(...ws);
  const lo=mn-.5,hi=mx+.5,range=(hi-lo)||1,n=ser.length;
  const xx=i=>pad+(n===1?(W-pad*2)/2:(i/(n-1))*(W-pad*2));
  const yy=v=>pad+(1-(v-lo)/range)*(H-pad*2);
  const pts=ser.map((s,i)=>xx(i)+','+yy(s.w)).join(' ');
  return`<svg viewBox="0 0 ${W} ${H}" style="width:100%;height:155px" preserveAspectRatio="none">
    ${[0,.5,1].map(t=>`<line x1="${pad}" x2="${W-pad}" y1="${pad+t*(H-pad*2)}" y2="${pad+t*(H-pad*2)}" stroke="${C.line}" stroke-width="1"/>`).join('')}
    <polyline points="${pts}" fill="none" stroke="${C.p}" stroke-width="2.5" stroke-linejoin="round" stroke-linecap="round"/>
    ${ser.map((s,i)=>`<circle cx="${xx(i)}" cy="${yy(s.w)}" r="3.5" fill="${C.p}"/>`).join('')}
    <text x="2" y="${yy(mx)+4}" font-size="11" fill="${C.muted}">${mx}</text>
    <text x="2" y="${yy(mn)+4}" font-size="11" fill="${C.muted}">${mn}</text>
    <text x="${xx(0)}" y="${H-3}" font-size="11" fill="${C.muted}">${ser[0].l}</text>
    <text x="${xx(n-1)}" y="${H-3}" font-size="11" fill="${C.muted}" text-anchor="end">${ser[n-1].l}</text>
  </svg>`
}
 
// ═══════════════════════ TAB: TODAY ═══════════════════════
function renderToday(){
  const ent=getE(),ser=wSer(),last=ser.length?ser[ser.length-1]:null;
  let d7=null;
  if(ser.length>=2){const la=ser[ser.length-1],cut=shiftD(la.d,-7),ear=ser.filter(s=>s.d<=cut);const base=ear.length?ear[ear.length-1]:ser[0];d7=Math.round((la.w-base.w)*10)/10}
  const d7c=d7==null?C.muted:d7>0?C.w:C.g,d7b=d7==null?C.line:d7>0?C.wS:C.gS;
  const stats=`<div style="display:flex;gap:12px;margin-bottom:16px">
    ${statBox('当前体重',last?last.w+'斤':'—',C.p,C.pS)}
    ${statBox('近7天',d7==null?'—':(d7>0?'+':'')+d7+(d7==null?'':'斤'),d7c,d7b)}
    ${statBox('今日水',(ent.water||0)+'杯',C.g,C.gS)}
  </div>`;
  const chartCard=card('体重趋势',renderChart(ser));
  const td=today();
  const dateNav=`<div style="display:flex;align-items:center;justify-content:space-between;margin:20px 2px 12px">
    <button data-a="prevDay" style="width:38px;height:38px;border-radius:12px;border:1px solid ${C.line};background:${C.card};color:${C.ink};font-size:22px;cursor:pointer;line-height:1">‹</button>
    <div style="text-align:center">
      <div style="font-family:${SR};font-size:18px;font-weight:600">${e(prettyD(DATE))}</div>
      ${DATE!==td?`<button data-a="goToday" style="background:none;border:none;color:${C.w};font-size:12px;cursor:pointer;margin-top:2px">回到今天</button>`:''}
    </div>
    <button data-a="nextDay" ${DATE>=td?'disabled':''} style="width:38px;height:38px;border-radius:12px;border:1px solid ${C.line};background:${C.card};color:${DATE>=td?C.faint:C.ink};font-size:22px;cursor:pointer;line-height:1">›</button>
  </div>`;
  const wCard=card('今日体重',`<div style="display:flex;gap:8px;align-items:center">
    <input id="wIn" value="${e(wIn)}" inputmode="decimal" placeholder="例如 110" style="${IS('flex:1')}">
    <span style="color:${C.muted};font-size:14px;flex-shrink:0">斤</span>
    <button data-a="saveW" style="${BS(C.p)}">保存</button>
  </div>`);
  const cups=Math.max(8,ent.water||0);
  const wCups=Array.from({length:cups},(_,i)=>`<button data-a="addWater" aria-label="加一杯水" style="font-size:20px;opacity:${i<(ent.water||0)?1:.2};filter:${i<(ent.water||0)?'none':'grayscale(1)'};background:none;border:none;padding:0;cursor:pointer;line-height:1">💧</button>`).join('');
  const waterCard=card('今日喝水 · 点一下加一杯',`<div style="display:flex;align-items:center;gap:14px">
    <button data-a="addWater" style="width:56px;height:56px;border-radius:16px;border:none;background:${C.g};color:#fff;font-size:26px;cursor:pointer;flex-shrink:0">＋</button>
    <div style="flex:1"><div style="display:flex;flex-wrap:wrap;gap:5px">${wCups}</div>
    <div style="font-size:12px;color:${C.muted};margin-top:6px">今天 ${ent.water||0} 杯${(ent.water||0)>=6?' · 喝得不错 🌿':''}</div></div>
    ${(ent.water||0)>0?`<button data-a="subWater" style="${BS(C.line)};color:${C.muted}">−1</button>`:''}
  </div>`);
  // Period status brief
  const ci=cycInfo();const t=today();const grp=ci.gs.find(g=>t>=g.s&&t<=g.e);
  let pst;

      <label style="${BS(C.g,'flex:1;text-align:center;cursor:pointer;display:block')}">🖼 相册<input type="file" accept="image/*" multiple id="albBtn" style="display:none"></label>
    </div>
    ${photoPrev?`<img src="${photoPrev}" style="width:100%;max-height:200px;object-fit:cover;border-radius:12px;margin-top:12px">
      <button data-a="savePhoto" style="${BS(C.w,'width:100%;margin-top:8px')}">📌 存进今天</button>`:''}
    ${photoImgs?`<div style="display:flex;gap:8px;flex-wrap:wrap;margin-top:10px">${photoImgs}</div>`:''}
  `);
  // Meals
  const mPills=MTYPES.map(t=>pill(mType===t,C.g,C.gS,t,'setMType')).join('');
  const mList=(ent.meals||[]).map(m=>`<div style="display:flex;align-items:center;gap:10px;padding:9px 0;border-top:1px solid ${C.line}">

    <div style="display:flex;gap:6px;margin-bottom:10px;flex-wrap:wrap">${mPills}</div>

      <input id="mIn" value="${e(mTxt)}" placeholder="鸡胸肉沙拉、酸奶、燕麦…" style="${IS()}">

}
 
// ═══════════════════════ TAB: FOOD ═══════════════════════
function renderFood(){

    </div>

  `);
  const wList=S.wishlist.map(x=>`<span style="display:inline-flex;align-items:center;gap:6px;background:${C.wS};color:${C.w};padding:6px 10px;border-radius:999px;font-size:13px;margin:3px">${e(x.name)}${xbtn('delW',x.id)}</span>`).join('');
  const wCard=card('想吃清单',`
    <div style="display:flex;gap:8px;margin-bottom:10px">
      <input id="wiIn" value="${e(wiTxt)}" placeholder="牛油果、虾、莲藕…" style="${IS()}">

// ═══════════════════════ TAB: BILLS ═══════════════════════
function renderBills(){
  const cur=S.cur||'$';
  const cPills=CATS.map(([n,ic])=>pill(eCat===n,C.p,C.pS,ic+' '+n,'setECat',n)).join('');
  const calcBtns=['7','8','9','÷','4','5','6','×','1','2','3','−','.','0','⌫','+','C','='];
  const calcHTML=`<div style="display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin:8px 0 10px">
    ${calcBtns.map(k=>`<button data-a="calcKey" data-v="${k}" style="height:36px;border-radius:10px;border:1px solid ${C.line};background:${k==='='?C.p:k==='C'?C.wS:C.card};color:${k==='='?'#fff':k==='C'?C.w:C.ink};font-size:15px;cursor:pointer">${k}</button>`).join('')}
  </div>`;
  const addCard=card('记一笔',`
    <div style="display:flex;gap:8px;margin-bottom:8px">
      <div style="${IS('flex:1;display:flex;align-items:center;gap:4px')}">
        <span style="color:${C.muted};flex-shrink:0">${cur}</span>
        <input id="eAmt" value="${e(eAmt)}" inputmode="decimal" placeholder="金额，可输入 12+8÷2" style="border:none;outline:none;background:none;flex:1;font-size:15px;color:${C.ink};width:100%">

    </div>
    ${calcHTML}
    <div style="font-size:11px;color:${C.faint};margin:-2px 0 10px">可以直接输入 18+6、120÷2、35×0.8，点 = 后会自动算出金额。</div>
    <div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:8px">${cPills}</div>
    <div style="display:flex;gap:8px">
      <input id="eNote" value="${e(eNote)}" placeholder="备注（可选）" style="${IS()}">
      <button data-a="addE" style="${BS(C.p)}">记账</button>
    </div>
  `);
  const monExp=S.expenses.filter(x=>x.date.slice(0,7)===eMon);
  const total=monExp.reduce((s,x)=>s+x.amount,0);
  const byCat={};monExp.forEach(x=>{byCat[x.cat]=(byCat[x.cat]||0)+x.amount});
  const maxV=Math.max(1,...Object.values(byCat));
  const catEmoji=n=>(CATS.find(x=>x[0]===n)||['','✨'])[1];
  const barList=Object.entries(byCat).sort((a,b)=>b[1]-a[1]).map(([n,v])=>`
    <div style="margin-bottom:10px">
      <div style="display:flex;justify-content:space-between;font-size:13px;margin-bottom:3px">
        <span>${catEmoji(n)} ${e(n)}</span><span style="color:${C.muted}">${cur}${v.toFixed(2)}</span>
      </div>
      <div style="height:8px;border-radius:4px;background:${C.line}">
        <div style="width:${(v/maxV*100).toFixed(1)}%;height:100%;border-radius:4px;background:${C.p}"></div>
      </div>
    </div>`).join('');
  const summCard=card('',`
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px">
      <button data-a="prevMon" style="width:34px;height:34px;border-radius:10px;border:1px solid ${C.line};background:${C.card};color:${C.ink};font-size:20px;cursor:pointer;line-height:1">‹</button>
      <div style="text-align:center">
        <div style="font-size:12px;color:${C.muted}">${e(eMon.replace('-','年')+'月')} 合计</div>
        <div style="font-family:${SR};font-size:28px;font-weight:600;color:${C.p}">${cur}${total.toFixed(2)}</div>
      </div>
      <button data-a="nextMon" ${eMon>=today().slice(0,7)?'disabled':''} style="width:34px;height:34px;border-radius:10px;border:1px solid ${C.line};background:${C.card};color:${eMon>=today().slice(0,7)?C.faint:C.ink};font-size:20px;cursor:pointer;line-height:1">›</button>
    </div>
    ${barList||empty('这个月还没有账单。')}
  `);
  const detail=monExp.length?card('明细',monExp.map(x=>`<div style="display:flex;align-items:center;gap:10px;padding:9px 0;border-top:1px solid ${C.line}">
    <span style="font-size:18px">${catEmoji(x.cat)}</span>
    <div style="flex:1"><div style="font-size:14px">${e(x.cat)}${x.note?' · '+e(x.note):''}</div>
    <div style="font-size:11px;color:${C.faint}">${x.date.slice(5)}</div></div>
    <span style="font-size:15px;font-weight:600">${cur}${x.amount.toFixed(2)}</span>
    ${xbtn('delE',x.id)}
  </div>`).join('')):'';
  return addCard+summCard+detail
}

          <span style="width:46px;height:46px;border-radius:12px;background:${acc};display:inline-block"></span>

          ${S.accent?`<button data-a="clearAccent" style="${BS(C.line)};color:${C.muted}">清除</button>`:''}
        </div>
        ${slider('色相',hsl.h,0,360,'hueSlide',`linear-gradient(90deg,red,#ff0,#0f0,#0ff,#00f,#f0f,red)`)}
        ${slider('饱和',hsl.s,0,100,'satSlide',`linear-gradient(90deg,#bbb,${hsl2hex(hsl.h,100,50)})`)}
        ${slider('明度',hsl.l,5,92,'litSlide',`linear-gradient(90deg,#000,${hsl2hex(hsl.h,hsl.s,50)},#fff)`)}
      `)}
      ${card('柔色透明度',`
        ${slider('浓度',Math.round(aS*100),5,40,'alphaSlide',`linear-gradient(90deg,transparent,${acc})`)}

        <label style="${BS(C.p,'cursor:pointer;position:relative')}">选底色<input type="color" value="${C.bg}" id="bgPicker" style="opacity:0;width:0;height:0;position:absolute"></label>
        ${S.bgc?`<button data-a="clearBg" style="${BS(C.line)};color:${C.muted}">恢复</button>`:''}

        <div style="display:flex;gap:8px">
          <button data-a="exportData" style="${BS(C.g,'flex:1')}">⬇️ 导出备份</button>
          <label style="${BS(C.p,'flex:1;text-align:center;cursor:pointer')}">⬆️ 导入备份<input type="file" accept=".json,application/json" id="importBtn" style="display:none"></label>
        </div>

// ═══════════════════════ MAIN RENDER ═══════════════════════
function render(){
  C=resolveC();
  document.body.style.background=TAB==='me'?'#0B0A1E':C.bg;
  document.body.style.color=C.ink;
  let main='';
  if(TAB==='me'){main=renderMe()}
  else{
    let body='';
    if(TAB==='today')body=renderToday();
    else if(TAB==='food')body=renderFood();
    else if(TAB==='bills')body=renderBills();
    else if(TAB==='list')body=renderList();
    else if(TAB==='journal')body=renderJournal();
    main=`
      <div style="position:fixed;top:0;right:0;width:200px;height:200px;border-radius:50%;background:${C.pS};filter:blur(10px);opacity:.6;pointer-events:none;z-index:0"></div>
      <div style="position:fixed;top:35%;left:-50px;width:160px;height:160px;border-radius:50%;background:${C.gS};filter:blur(10px);opacity:.5;pointer-events:none;z-index:0"></div>
      <div style="max-width:560px;margin:0 auto;padding:22px 16px 100px;position:relative;z-index:1">
        <div style="display:flex;align-items:flex-end;justify-content:space-between;margin-bottom:16px">
          <div>
            <div style="font-size:11px;letter-spacing:3px;color:${C.faint};text-transform:uppercase">daily log</div>
            <h1 style="font-family:${SR};font-size:26px;font-weight:600;margin-top:2px">饮食 & 体重小本</h1>
          </div>
          <button data-a="openSett" style="width:40px;height:40px;border-radius:12px;border:1px solid ${C.line};background:${C.card};color:${C.ink};font-size:18px;cursor:pointer">⚙️</button>
        </div>
        ${body}
      </div>`
  }
  const isMe=TAB==='me';
  const tabs=[['today','今日','🍃'],['food','食材','🧺'],['bills','账单','💰'],['list','清单','✓'],['journal','手帐','📖'],['me','我','✦']];
  const nav=`<div style="position:fixed;left:0;right:0;bottom:0;z-index:10;height:74px;display:flex;justify-content:center;background:${isMe?'rgba(11,10,30,.75)':C.card+'EE'};backdrop-filter:blur(12px);border-top:1px solid ${isMe?'rgba(255,255,255,.08)':C.line};padding-bottom:12px">
    ${tabs.map(([id,label,icon])=>{const on=TAB===id;const col=isMe?(on?'#fff':'#7E79A8'):(on?C.p:C.faint);return`<button data-a="setTab" data-v="${id}" style="flex:1;background:none;border:none;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:2px;color:${col};padding-top:10px"><span style="font-size:17px;opacity:${on?1:.55}">${icon}</span><span style="font-size:10px;font-weight:${on?600:400}">${label}</span></button>`}).join('')}
  </div>`;
  const sett=showSett?renderSettings():'';
  document.getElementById('app').innerHTML=main+nav+sett;
  bindEvents();
  loadVisibleImages();
}
 
// ═══════════════════════ IMAGE LOADER ═══════════════════════
async function loadVisibleImages(){
  const imgs=document.querySelectorAll('img[data-lid]');
  for(const img of imgs){
    const id=img.dataset.lid;
    if(!id||img.src)continue;
    const src=await loadImg(id);
    if(src){img.src=src}
  }
}
 
// ═══════════════════════ EVENTS ═══════════════════════
function handleRange(ev){
  const a=ev.target.dataset.a,v=Number(ev.target.value);
  const acc=S.accent||C.p;const hsl=S.accent?h2hsl(S.accent):sHsl;
  if(a==='hueSlide'){const nh={...hsl,h:v};sHsl=nh;save({...S,accent:hsl2hex(nh.h,nh.s,nh.l)})}
  else if(a==='satSlide'){const nh={...hsl,s:v};sHsl=nh;save({...S,accent:hsl2hex(nh.h,nh.s,nh.l)})}
  else if(a==='litSlide'){const nh={...hsl,l:v};sHsl=nh;save({...S,accent:hsl2hex(nh.h,nh.s,nh.l)})}
  else if(a==='alphaSlide'){save({...S,accentA:v/100})}
}
window.handleRange=handleRange;
 
function bindEvents(){
  const app=document.getElementById('app');
  if(!app)return;
  // Click
  app.onclick=async ev=>{
    const el=ev.target.closest('[data-a]');if(!el)return;
    const a=el.dataset.a,v=el.dataset.v,id=el.dataset.id,lid=el.dataset.lid;
    if(a==='setTab'){TAB=v;wIn=getE().weight!=null?String(getE().weight):'';render();return}
    if(a==='prevDay'){DATE=shiftD(DATE,-1);wIn=getE().weight!=null?String(getE().weight):'';render();return}
    if(a==='nextDay'){if(DATE<today()){DATE=shiftD(DATE,1);wIn=getE().weight!=null?String(getE().weight):'';render()};return}
    if(a==='goToday'){DATE=today();wIn=getE().weight!=null?String(getE().weight):'';render();return}
    if(a==='saveW'){const w=parseFloat(document.getElementById('wIn')?.value||'');mutE(e=>{e.weight=isNaN(w)?null:Math.round(w*10)/10});return}
    if(a==='addWater'){mutE(e=>{e.water=(e.water||0)+1});return}
    if(a==='subWater'){mutE(e=>{e.water=Math.max(0,(e.water||0)-1)});return}
    if(a==='setMType'){mType=v;render();return}
    if(a==='addMeal'){const t=(document.getElementById('mIn')?.value||'').trim();if(!t)return;mTxt='';mutE(e=>{e.meals=[...e.meals,{id:Date.now(),type:mType,text:t}]});return}
    if(a==='delMeal'){mutE(e=>{e.meals=e.meals.filter(m=>String(m.id)!==id)});return}
    if(a==='savePhoto'){if(!photoPrev)return;const pid=await storeImg(photoPrev);photoPrev='';mutE(e=>{e.photos=[...e.photos,pid]});return}
    if(a==='delPhoto'){mutE(e=>{e.photos=e.photos.filter(x=>x!==id)});await delImg(id);return}
    if(a==='addP'){const n=(document.getElementById('pN')?.value||'').trim();if(!n)return;const q=parseFloat(document.getElementById('pQ')?.value||'');pN='';pQ='';pE='';save({...S,pantry:[...S.pantry,{id:Date.now(),name:n,qty:isNaN(q)?null:q,unit:pU,exp:document.getElementById('pE')?.value||null}]});return}
    if(a==='stepP'){const d=parseFloat(v);save({...S,pantry:S.pantry.map(x=>x.id==id?{...x,qty:x.qty==null?null:Math.max(0,Math.round((x.qty+d)*10)/10)}:x)});return}
    if(a==='delP'){save({...S,pantry:S.pantry.filter(x=>String(x.id)!==id)});return}
    if(a==='addW'){const t=(document.getElementById('wiIn')?.value||'').trim();if(!t)return;wiTxt='';save({...S,wishlist:[...S.wishlist,{id:Date.now(),name:t}]});return}
    if(a==='delW'){save({...S,wishlist:S.wishlist.filter(x=>String(x.id)!==id)});return}
    if(a==='calcKey'){pressCalcKey(v);return}
    if(a==='addE'){const amt=calcAmount(document.getElementById('eAmt')?.value||'');if(isNaN(amt)||amt<=0)return;const note=(document.getElementById('eNote')?.value||'').trim();const dt=document.getElementById('eDate')?.value||today();eAmt='';eNote='';save({...S,expenses:[{id:Date.now(),amount:Math.round(amt*100)/100,cat:eCat,note,date:dt},...S.expenses]});return}
    if(a==='setECat'){eCat=v;render();return}
    if(a==='delE'){save({...S,expenses:S.expenses.filter(x=>String(x.id)!==id)});return}
    if(a==='prevMon'){eMon=shiftM(eMon,-1);render();return}
    if(a==='nextMon'){if(eMon<today().slice(0,7)){eMon=shiftM(eMon,1);render()};return}
    if(a==='addList'){const t=(document.getElementById('nList')?.value||'').trim();if(!t)return;nList='';save({...S,lists:[{id:Date.now(),title:t,items:[]},...S.lists]});return}
    if(a==='delList'){save({...S,lists:S.lists.filter(l=>String(l.id)!==id)});return}
    if(a==='addItem'){const iid=el.dataset.lid||lid;const inEl=document.getElementById('li_'+iid);const t=(inEl?.value||'').trim();if(!t)return;liIn[iid]='';save({...S,lists:S.lists.map(l=>String(l.id)===iid?{...l,items:[...l.items,{id:Date.now(),text:t,done:false}]}:l)});return}
    if(a==='toggleItem'){const iid=el.dataset.lid;save({...S,lists:S.lists.map(l=>String(l.id)===iid?{...l,items:l.items.map(it=>String(it.id)===id?{...it,done:!it.done}:it)}:l)});return}
    if(a==='delItem'){const[iid,llid]=id.split('/');save({...S,lists:S.lists.map(l=>String(l.id)===llid?{...l,items:l.items.filter(it=>String(it.id)!==iid)}:l)});return}
    if(a==='setJMood'){jMood=v;render();return}
    if(a==='setJFont'){jFont=v;render();return}
    if(a==='setJHi'){jHi=v==='null'?null:v;render();return}
    if(a==='setJTape'){jTape=v;render();return}
    if(a==='setJSt'){jSt=v==='null'?null:v;render();return}
    if(a==='delJImg'){jImgs=jImgs.filter((_,i)=>String(i)!==id);render();return}
    if(a==='addJ'){
      const t=(document.getElementById('jTxt')?.value||'').trim();
      const ids=[];for(const u of jImgs){const pid=await storeImg(u);if(pid)ids.push(pid)}
      const savedHi=jHi, savedSt=jSt;
      jTxt='';jImgs=[];jSt=null;jHi=null;
      save({...S,journal:[{id:Date.now(),date:today(),mood:jMood,text:t,font:jFont,hi:savedHi,tape:jTape,sticker:savedSt,imgs:ids},...S.journal]});return
    }
    if(a==='delJ'){const j=S.journal.find(x=>String(x.id)===id);if(j)(j.imgs||[]).forEach(delImg);save({...S,journal:S.journal.filter(x=>String(x.id)!==id)});return}
    if(a==='openCompose'){composing=true;meTxt='';meImgs=[];render();return}
    if(a==='cancelMe'){composing=false;render();return}
    if(a==='saveFrag'){
      const t=(document.getElementById('meTxt')?.value||'').trim();
      const ids=[];for(const u of meImgs){const pid=await storeImg(u);if(pid)ids.push(pid)}
      const frag={id:Date.now(),text:t,date:today(),x:8+Math.random()*84,y:18+Math.random()*60,hue:Math.floor(Math.random()*360),imgs:ids};
      composing=false;meTxt='';meImgs=[];
      save({...S,frags:[...S.frags,frag]});return
    }
    if(a==='readFrag'){const f=S.frags.find(x=>String(x.id)===id);if(f){readFrag=f;for(const i of(f.imgs||[]))await loadImg(i);render()};return}
    if(a==='closeRead'){readFrag=null;render();return}
    if(a==='delFrag'){const f=S.frags.find(x=>String(x.id)===id);if(f)(f.imgs||[]).forEach(delImg);readFrag=null;save({...S,frags:S.frags.filter(x=>String(x.id)!==id)});return}
    if(a==='openSett'){showSett=true;if(S.accent)sHsl=h2hsl(S.accent);render();return}
    if(a==='closeSett'){showSett=false;render();return}
    if(a==='setTheme'){save({...S,theme:v,accent:null,bgc:null});return}
    if(a==='clearAccent'){save({...S,accent:null});return}
    if(a==='clearBg'){save({...S,bgc:null});return}
    if(a==='setCur'){save({...S,cur:v});return}
    if(a==='exportData'){await exportData();return}
  };
  // Input events
  app.oninput=ev=>{
    const el=ev.target;
    if(el.id==='wIn'){wIn=el.value}
    if(el.id==='mIn'){mTxt=el.value}
    if(el.id==='pN'){pN=el.value}
    if(el.id==='pQ'){pQ=el.value}
    if(el.id==='pE'){pE=el.value}
    if(el.id==='pU'){pU=el.value}
    if(el.id==='wiIn'){wiTxt=el.value}
    if(el.id==='nList'){nList=el.value}
    if(el.id==='eAmt'){eAmt=el.value}
    if(el.id==='eNote'){eNote=el.value}
    if(el.id==='eDate'){eDate=el.value}
    if(el.id==='jTxt'){jTxt=el.value}
    if(el.id==='meTxt'){meTxt=el.value}
    if(el.id&&el.id.startsWith('li_')){const lid=el.id.slice(3);liIn[lid]=el.value}
    if(el.id==='accentPicker'){sHsl=h2hsl(el.value);save({...S,accent:el.value});return}
    if(el.id==='bgPicker'){save({...S,bgc:el.value});return}
  };
  // File inputs
  app.onchange=async ev=>{
    const el=ev.target;
    if(el.id==='capBtn'||el.id==='albBtn'){
      if(!el.files||!el.files.length)return;
      if(el.id==='capBtn'){
        try{const u=await compressFile(el.files[0]);photoPrev=u;el.value='';render()}catch(err){console.error(err)}
      }else{
        const ids=[];for(const f of el.files){try{const u=await compressFile(f);const pid=await storeImg(u);ids.push(pid)}catch(err){}}
        el.value='';if(ids.length)mutE(e=>{e.photos=[...e.photos,...ids]})
      }
      return
    }
    if(el.id==='jImgBtn'){
      if(!el.files||!el.files.length)return;
      const urls=[];for(const f of el.files){try{const u=await compressFile(f);urls.push(u)}catch(err){}}
      el.value='';jImgs=[...jImgs,...urls];render();return
    }
    if(el.id==='meImgBtn'){
      if(!el.files||!el.files.length)return;
      const urls=[];for(const f of el.files){try{const u=await compressFile(f);urls.push(u)}catch(err){}}
      el.value='';meImgs=[...meImgs,...urls];render();return
    }
    if(el.id==='importBtn'){
      if(!el.files||!el.files.length)return;
      await importData(el.files[0]);return
    }
  };
  // Period tab interaction (handled via period tab if separate; here via today periodCard)
}
 
// ═══════════════════════ EXPORT / IMPORT ═══════════════════════
async function exportData(){
  const main=await idb.get(SKEY);
  const imgs={};const ks=await idb.keys('img:');
  for(const k of ks){const v=await idb.get(k);if(v)imgs[k]=v}
  const blob=new Blob([JSON.stringify({v:1,main,imgs})],{type:'application/json'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='小本备份_'+today()+'.json';a.click()
}
async function importData(file){
  try{
    const obj=JSON.parse(await file.text());
    if(obj.main)await idb.set(SKEY,obj.main);
    if(obj.imgs)for(const k in obj.imgs)await idb.set(k,obj.imgs[k]);
    location.reload()
  }catch(e){alert('导入失败，文件可能不对。')}
}
